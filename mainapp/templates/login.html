{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
form {
  display: flex;
  flex-direction: column;
  align-items: center;
}

form input {
  width: 100%;
  max-width: 100%;
  display: block;
  margin: 0 auto 12px auto;
  box-sizing: border-box;
}

.card {
  background: #020617;
  padding: 25px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.link {
  text-align: center;
  margin-top: 10px;
}

a {
  color: #60a5fa;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <form method="POST">
    {% csrf_token %}
    username: {{ form.username }}
    password: {{ form.password }}
    <button type="submit">Login</button>
  </form>

  <div class="link">
    <a href="{% url 'register' %}">Create account</a>
  </div>
</div>

</body>
</html>
